{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Delete Product</h2>
    <p class="subtitle">Submit a delete request to the backend route.</p>

    {% if deleted %}
    <div class="flash">Product deleted successfully.</div>
    {% endif %}

    <form method="post" action="{{ url_for('product.delete_product') }}">
        <label>
            Product ID
            <input type="text" name="product_id" value="{{ product_id or '' }}" required>
        </label>

        <div class="actions">
            <button type="submit">Delete product</button>
            <a class="button-link" href="{{ url_for('product.add_product') }}">Add product</a>
        </div>
    </form>
</div>
{% endblock %}
