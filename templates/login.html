<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PetCare</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    {% include "partials/navbar.html" %}

    <div class="auth-container">

        <div class="auth-left">

            <h1>Welcome Back!</h1>

            <p>
                Login to access your pets, appointments,
                community posts, and pet care services.
            </p>

        </div>

        <div class="auth-right">

            <div class="form-box">

                <h2>Login</h2>

                <form method="POST">

                    <input type="email"
                    name="email"
                    placeholder="Email Address"
                    required>

                    <input type="password"
                    name="password"
                    placeholder="Password"
                    required>

                    <button type="submit">
                        Login
                    </button>

                </form>

                <p class="bottom-text">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}">Register</a>
                </p>

            </div>

        </div>

    </div>

</body>
</html>
