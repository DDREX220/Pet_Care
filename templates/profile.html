{% extends "base.html" %}

{% block content %}
<div class="card">
	<h2>Profile</h2>
	<p class="subtitle">Update profile details through the auth controller.</p>

	<form method="post" action="{{ url_for('auth.profile') }}">
		<label>
			Name
			<input type="text" name="name" value="{{ name or '' }}" required>
		</label>

		<label>
			Email
			<input type="email" name="email" value="{{ email or '' }}" required>
		</label>

		<div class="actions">
			<button type="submit">Save profile</button>
			<a class="button-link" href="{{ url_for('home') }}">Dashboard</a>
		</div>
	</form>
</div>
{% endblock %}
