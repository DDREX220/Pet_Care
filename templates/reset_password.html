{% extends "base.html" %}

{% block content %}
<div class="card">
	<h2>Reset Password</h2>
	<p class="subtitle">Submit a reset request to the backend route.</p>

	<form method="post" action="{{ url_for('auth.reset_password') }}">
		<label>
			Email
			<input type="email" name="email" value="{{ email or '' }}" required>
		</label>

		<label>
			New Password
			<input type="password" name="new_password" required>
		</label>

		<label>
			Confirm Password
			<input type="password" name="confirm_password" required>
		</label>

		<div class="actions">
			<button type="submit">Reset password</button>
			<a class="button-link" href="{{ url_for('auth.login') }}">Back to login</a>
		</div>
	</form>
</div>
{% endblock %}
